services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - OPENAI_EMBED_MODEL=${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      - OPENAI_TIMEOUT=${OPENAI_TIMEOUT:-120}
      - OPENAI_API_MODE=${OPENAI_API_MODE:-}
      - OPENAI_REASONING_EFFORT=${OPENAI_REASONING_EFFORT:-medium}
      - AGENT_DB=/app/data/agent_memory.sqlite3
      - AGENT_VECTOR_DIR=/app/data/vector_db
      - AGENT_VECTOR_COLLECTION=${AGENT_VECTOR_COLLECTION}
      - AGENT_CONTEXT_TAIL=${AGENT_CONTEXT_TAIL}
      - AGENT_MEMORY_HITS=${AGENT_MEMORY_HITS}
      - AGENT_DEDUP_DISTANCE=${AGENT_DEDUP_DISTANCE}
      - SKILL_SHELL_ENABLED=${SKILL_SHELL_ENABLED:-false}
      - SKILL_HTTP_TIMEOUT=${SKILL_HTTP_TIMEOUT:-30}
      - SKILL_SSH_ENABLED=${SKILL_SSH_ENABLED:-false}
      - SKILL_SSH_IDENTITY_FILE=${SKILL_SSH_IDENTITY_FILE:-}
      - SKILL_SSH_DEFAULT_USER=${SKILL_SSH_DEFAULT_USER:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - gateway
    ports:
      - "${FRONTEND_PORT}:80"

  # Uncomment to run the Telegram bot as a service
  telegram-bot:
     build:
       context: .
       dockerfile: gateway/Dockerfile
     env_file:
       - .env
     environment:
       - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
       - GATEWAY_URL=http://gateway:8000
       - BOT_AUTH_ENABLED=${BOT_AUTH_ENABLED:-false}
       - BOT_ADMIN_ID=${BOT_ADMIN_ID:-0}
       - BOT_AUTH_DB=${BOT_AUTH_DB:-/app/data/telegram_auth.sqlite3}
     depends_on:
       - gateway
     command: ["python", "-m", "integrations.telegram.run"]
